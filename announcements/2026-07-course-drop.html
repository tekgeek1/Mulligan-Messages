<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mulligan Pro — What's New</title>
  <style>
    :root { --green:#1b7a3d; }
    body { margin:0; font:17px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
           color:#1c1c1e; background:#fff; -webkit-text-size-adjust:100%; }
    .wrap { max-width:640px; margin:0 auto; padding:24px 20px 60px; }
    header { border-bottom:3px solid var(--green); padding-bottom:12px; margin-bottom:20px; }
    h1 { font-size:24px; margin:0; color:var(--green); }
    .date { color:#8e8e93; font-size:14px; margin-top:4px; }
    h2 { font-size:19px; margin-top:28px; }
    a.btn { display:inline-block; margin-top:24px; background:var(--green); color:#fff;
            text-decoration:none; padding:12px 20px; border-radius:10px; font-weight:600; }
    ul { padding-left:20px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>600+ New Courses Just Added &#9971;&#65039;</h1>
      <div class="date">July 13, 2026</div>
    </header>
    <p>We just added hundreds of new courses across 17 states &mdash; your home course
       is more likely than ever to be in Mulligan Pro.</p>
    <h2>What's new</h2>
    <ul>
      <li>New courses in CA, FL, VA, NC, GA and more</li>
      <li>Search any of them by name right now</li>
    </ul>
    <a class="btn" href="mulligan://home">Open Mulligan Pro</a>
  </div>
</body>
</html>
